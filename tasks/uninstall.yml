---
- name: Check existence of Autobrr systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ autobrr_identifier }}.service"
  register: autobrr_service_stat

- name: Uninstall Autobrr systemd services and files
  when: autobrr_service_stat.stat.exists | bool
  block:
    - name: Ensure Autobrr systemd service is stopped
      ansible.builtin.service:
        name: "{{ autobrr_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Autobrr systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ autobrr_identifier }}.service"
        state: absent

    - name: Ensure Autobrr support files do not exist
      ansible.builtin.file:
        path: "{{ autobrr_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Autobrr local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ autobrr_data_path }}"
      register: autobrr_data_path_deletion_result
      changed_when: autobrr_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Autobrr local media path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ autobrr_media_path }}"
      register: autobrr_media_path_deletion_result
      changed_when: autobrr_media_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Autobrr base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ autobrr_base_path }}"
      register: autobrr_base_path_deletion_result
      changed_when: autobrr_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Autobrr container network does not exist
      when: autobrr_container_network_deletion_enabled
      block:
        - name: Ensure Autobrr container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ autobrr_container_network }}"
            state: absent
          register: autobrr_network_deletion_result

        - name: Ensure Autobrr container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ autobrr_container_network }}
          register: autobrr_network_deletion_result
          changed_when: autobrr_container_network in autobrr_network_deletion_result.stdout

- name: Check existence of Autobrr local data path
  ansible.builtin.stat:
    path: "{{ autobrr_data_path }}"
  register: autobrr_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Autobrr local data path
  when: autobrr_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Autobrr instance has been removed, some old data remains in `" + autobrr_data_path + "`. Feel free to delete it."
        ]
      }}
