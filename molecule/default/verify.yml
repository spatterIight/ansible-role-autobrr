---
- name: Verify Autobrr systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Autobrr service to become active (up to 180s)
      ansible.builtin.systemd:
        name: autobrr.service
      register: autobrr_service
      until: autobrr_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Autobrr service is active
      ansible.builtin.assert:
        that: autobrr_service.status.ActiveState == 'active'
        fail_msg: "autobrr.service not active ({{ autobrr_service.status.ActiveState }})"
        success_msg: "autobrr.service is active"

    - name: Wait for Autobrr HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:7474/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: autobrr_endpoint
      until: autobrr_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Autobrr HTTP endpoint responds
      ansible.builtin.assert:
        that: autobrr_endpoint.status in [200, 302]
        fail_msg: "Autobrr did not respond as expected ({{ autobrr_endpoint.status | default('no response') }})"
        success_msg: "Autobrr responded with {{ autobrr_endpoint.status }}"

    - name: Show Autobrr systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Autobrr systemd: {{ autobrr_service.status.ActiveState }}"
          - "Autobrr HTTP: {{ autobrr_endpoint.status }}"
